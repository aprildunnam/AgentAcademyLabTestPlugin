# Authentication — user authenticates manually in browser
auth:
  # The plugin opens a browser and navigates here, then waits for the user
  # to complete sign-in. No automated credential entry.
  login_url: "https://login.microsoftonline.com/"
  # After auth, verify we can reach these portals
  verify_urls:
    - "https://copilotstudio.microsoft.com/"
    - "https://make.powerapps.com/"
  # How long to wait for the user to complete authentication (seconds)
  auth_timeout_seconds: 300
  # Probe URL to check auth is still valid between lab sections
  auth_probe_url: "https://copilotstudio.microsoft.com/"

# Power Platform environment
# The environment URL the plugin navigates to before starting lab steps.
# This ensures all lab work happens in the correct Copilot Studio environment.
#
# Resolution order:
#   1. --env-url flag (per-run override)
#   2. AGENT_ACADEMY_ENV_URL environment variable (from .env file)
#   3. default_url below (fallback)
#
# Set your personal URL in .env (see .env.example) rather than editing this file.
# Override per-run with: /test-lab recruit/04-creating-a-solution --env-url <url>
environment:
  default_url: "${AGENT_ACADEMY_ENV_URL}"

# Portals used by Agent Academy labs
portals:
  copilot_studio: "https://copilotstudio.microsoft.com/"
  power_apps: "https://make.powerapps.com/"
  power_automate: "https://make.powerautomate.com/"
  m365_copilot: "https://m365.cloud.microsoft/chat/"
  power_platform_admin: "https://admin.powerplatform.microsoft.com/"
