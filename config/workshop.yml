# Workshop portal configuration for redeeming a test account.
#
# The default `workshop_portal_url` below targets the Architecture Bootcamp
# chatbot. Override it only if your event uses a different redemption portal.
#
# Portal shape switch used by the redemption flow dispatcher.
# - chatbot: Copilot Studio chat flow (Adaptive Cards)
# - skillable: code-entry form + confirmation-page credentials
# - email: portal accepts code but credentials are delivered by email
portal_kind: "chatbot"

workshop_portal_url: "https://aka.ms/MCSWorkshopAgent/"

# Selectors used only for `portal_kind: skillable`.
# These are accessibility-snapshot ref hints — the actual click/type uses
# Playwright MCP refs from a fresh snapshot at runtime, but the judge falls
# back to these hints if no good ref is found.
redemption_selectors:
  code_input_label: "Workshop code"           # accessibility label of the code-entry input
  submit_button_text: "Redeem"                # visible text on the submit button
  credentials_panel_heading: "Your account"   # heading text on the issued-credentials page
  username_label: "Username"                  # field label for the issued username
  password_label: "Password"                  # field label for the issued password
  tenant_label: "Tenant"                      # optional — present on some portals
  expiry_label: "Expires"                     # optional — present on some portals

# Where to navigate after redemption to establish SSO state.
# All AAD-federated portals share one signed-in browser session; signing
# into login.microsoftonline.com once is sufficient.
sso_anchor_url: "https://login.microsoftonline.com/"

# Probe URL hit at each scene boundary to detect mid-run auth expiry.
# Should be cheap and require authentication. Default points at Copilot Studio
# home, which is in scope for every bootcamp lab.
auth_probe_url: "https://copilotstudio.microsoft.com/"

# Optional: hint label written to audit-history.yml.tenant_hint. Never the actual
# tenant id — just a human-readable label for grouping past runs by event.
tenant_hint: "unspecified"

# ---------------------------------------------------------------------------
# Chatbot redemption form pre-fills (current Lab Assistant flow as of 2026-05)
# ---------------------------------------------------------------------------
# When `portal_kind: chatbot`, the redemption flow clicks "Get a User Account",
# accepts the consent terms, fills the "Training user account request" form,
# and submits. The plugin uses these defaults so it never has to ask the
# user during redemption — the only thing the user might need to provide is
# the workshop code (and only on legacy events where the chatbot still needs
# one; the current chatbot does not).
#
# Override any field for your event if its telemetry policy needs different
# values. Empty string ("") for a required field is a configuration error
# and the redemption flow will abort.
chatbot_account_request_form:
  organization_type: "Microsoft"
  industry: "Technology (software & services)"
  company_size: "10,001+"
  country: "United States"
  job_title: "Software Engineer"

# Does the current event's chatbot require a workshop code before issuing the
# account? Default `true` — the bootcamp chatbot accepts the workshop code on
# the first "Workshop Pass Code" Adaptive Card, then the "Get a User Account"
# suggested-action button continues the flow (consent → form → credentials).
# A workshop code is required unless a cached user account is reused.
#
# Set to `false` only if your event's chatbot truly does not gate on a code
# (rare — most Microsoft-internal workshops require one). When `true`, the
# plugin prompts for the code via AskUserQuestion at the start of redemption.
workshop_code_required: true

# Pattern for the new password set during the AAD first-login forced password
# change. {year} is replaced with the current calendar year. Must satisfy
# tenant password policy (length, complexity, mixed case, digit, symbol).
# Avoid `{year}` placeholders that would produce a password the temp password
# could match — the AAD password-change page rejects same-as-current.
account_new_password_pattern: "Bootcamp-Audit-{year}!Q9"
