# Workshop portal configuration for redeeming a test account.
#
# The `workshop_portal_url` is event-specific — get it from whoever distributed
# your workshop code. The default below is the Architecture Bootcamp chatbot.
#
# Portal shape switch used by the redemption flow dispatcher.
# - chatbot: Copilot Studio chat flow (Adaptive Cards)
# - skillable: code-entry form + confirmation-page credentials
# - email: portal accepts code but credentials are delivered by email
portal_kind: "chatbot"

workshop_portal_url: "https://aka.ms/MCSWorkshopAgent/"

# Selectors used only for `portal_kind: skillable`.
# These are accessibility-snapshot ref hints — the actual click/type uses
# Playwright MCP refs from a fresh snapshot at runtime, but the judge falls
# back to these hints if no good ref is found.
redemption_selectors:
  code_input_label: "Workshop code"           # accessibility label of the code-entry input
  submit_button_text: "Redeem"                # visible text on the submit button
  credentials_panel_heading: "Your account"   # heading text on the issued-credentials page
  username_label: "Username"                  # field label for the issued username
  password_label: "Password"                  # field label for the issued password
  tenant_label: "Tenant"                      # optional — present on some portals
  expiry_label: "Expires"                     # optional — present on some portals

# Where to navigate after redemption to capture SSO state.
# All AAD-federated portals share a single storage state; signing into
# login.microsoftonline.com once is sufficient.
sso_anchor_url: "https://login.microsoftonline.com/"

# Probe URL hit at each scene boundary to detect mid-run auth expiry.
# Should be cheap and require authentication. Default points at Copilot Studio
# home, which is in scope for every bootcamp lab.
auth_probe_url: "https://copilotstudio.microsoft.com/"

# Optional: hint label written to audit-history.yml.tenant_hint. Never the actual
# tenant id — just a human-readable label for grouping past runs by event.
tenant_hint: "unspecified"
