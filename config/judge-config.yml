# Judge and orchestration configuration.

# --- Confidence thresholds ---
# Findings below `min_to_log` are dropped entirely.
# Findings at or above `min_to_include_in_issue` are sent to GitHub.
# Findings between these two values are kept locally but excluded from the issue.
# Findings between `low_confidence_marker_max` and `min_to_include_in_issue` are
# included in the issue but tagged with "(low confidence — please verify)".
confidence:
  min_to_log: 0.5
  low_confidence_marker_max: 0.7
  min_to_include_in_issue: 0.5    # same as min_to_log → all logged findings go to issue, low-conf tagged

# --- Step execution ---
execution:
  transient_retries: 1            # retry once on `transient` verdict (UI-side, page reachable)
  max_steps_per_lab: 200          # hard cap to bound cost on runaway labs
  min_seconds_between_labs: 30    # pause between labs to avoid rate limits
  scene_boundary_probe: true      # if true, hit auth_probe_url at each scene start
  skip_judge_on_pure_navigate: true   # skip the LLM judge for navigate steps with no observable target

  # --- Interactive phase enforcement ---
  # When true (default), the orchestrator MUST run Phase 2 (interactive UI
  # execution) for every audited lab. Static analysis alone catches typos,
  # broken links, and missing images — it does not catch UI drift in the
  # live product. Skipping Phase 2 produces a documentation audit, not a
  # lab audit. The only way to opt out is to set this to `false` or pass
  # `--static-only` on the command line; either choice is recorded in the
  # run manifest so future readers know why the interactive phase was
  # skipped.
  require_interactive_phase: true

  # --- Run-start account prompt ---
  # Controls whether Phase 1.5 asks the user "use cached vs. redeem new"
  # at every run start.
  # - `always` (default): prompt every fresh run, regardless of cache
  #   freshness. Forces the user to opt in to reuse — the safety net
  #   against accidentally running against last week's tenant.
  # - `only_if_expired`: skip the prompt only when expires_at is in the
  #   future; prompt when expired or missing.
  # - `only_if_missing`: prompt only when no cached account exists.
  #   Equivalent to the pre-0.2 behavior. Not recommended.
  account_prompt_mode: always

  # --- Connection-error retry policy ---
  # Distinct from `transient_retries`, which covers UI-side timeouts on a
  # page that is itself reachable. These settings handle the connection
  # class: DNS failure, net::ERR_*, repeated navigation timeouts to URLs
  # that should resolve quickly, or any failed-network entry that recurs
  # across consecutive steps.
  #
  # On a connection failure, the orchestrator retries up to
  # `network_retry_count` times with the per-attempt backoff below, then
  # halts the lab and prompts the user via AskUserQuestion for next steps
  # (retry / wait / skip lab / abort run). Connection failures are NEVER
  # recorded as lab findings — they're environment issues, not lab issues.
  network_retry_count: 3
  network_retry_backoff_seconds: [5, 10, 20]   # exponential, matched to retry count
  network_wait_seconds: 120        # default "wait then retry" sleep when the user picks that option

  # --- Fan-out execution (parallel labs) ---
  # `fanout_concurrency` caps how many labs run their interactive Playwright
  # pass simultaneously. 1 = strictly serial (legacy behavior). The static
  # phase always fans out fully — only the interactive phase is throttled,
  # because every concurrent browser instance signs in to the same training
  # account and can collide with the others' tenant state.
  #
  # Static phase (markdown parsing, link checks, image refs, structural
  # validation) has no tenant state and is always run in parallel via
  # background subagents — one per lab — capped at `static_fanout_concurrency`.
  fanout_concurrency: 1            # interactive UI passes per training account
  static_fanout_concurrency: 11    # background subagents for static analysis

# --- Lab dependency graph ---
# Some bootcamp labs build on prior labs' artifacts (agents, topics, knowledge
# sources, evaluations created in the training tenant). Running them out of
# order leaves the next lab without the prerequisites its instructions assume.
#
# Express each chain as a list of slugs in the order they must execute.
# The orchestrator topologically sorts these against the planned lab list:
# - Labs that appear in a chain run in chain order (serially).
# - Labs that don't appear in any chain run in parallel (up to fanout_concurrency).
# - When a chain is interleaved with parallel labs, the chain runs to
#   completion before its dependents start; independent parallel labs run
#   alongside the chain.
lab_dependencies:
  - reason: |
      core-concepts-* labs share a single agent created in lab #2 and
      progressively add knowledge sources, topics, variables, channel
      deployments, and analytics+evaluation telemetry. Each later lab
      reads state the earlier lab wrote.
    chain:
      - core-concepts-agent-knowledge-tools          # #2 — creates the base agent + knowledge sources + topics
      - core-concepts-variables-agents-channels      # #3 — adds variables, multi-agent refs, and channel deploys
      - core-concepts-analytics-evaluations          # #4 — reads analytics + runs evaluations against #2/#3 artifacts

# --- Non-deterministic labs ---
# These labs render LLM-generated UI (Agent Builder, multi-agent demos) that
# varies per call. Default to log-only (no GitHub issue) and use a softer
# shape-match rubric in the judge prompt. Override per-run with --force-issue.
non_deterministic_lab_slugs:
  - agent-builder-m365
  - mcs-multi-agent

# --- Critique pass ---
# If enabled, every finding flagged as `broken` or `unclear` runs through a
# second-pass critique judge that argues for the opposite verdict. Findings
# that survive critique keep their original verdict; findings that don't are
# downgraded to log-only. Adds ~10% cost; significantly reduces false positives.
critique:
  enabled: true
  downgrade_on_failure: true

# --- Issue de-duplication (UNCONDITIONAL) ---
# The plugin will never create a second open issue for the same lab. The only
# tunable here is what to do when an open issue already exists: "comment" (the
# default — append a fingerprint-deduped delta comment) or "skip" (record the
# existing issue URL and write nothing). "create_anyway" is DEPRECATED and is
# silently treated as "comment".
issues:
  repo: "microsoft/mcs-labs"
  dedupe_by_labels: ["lab-audit"]               # required label on every audit-filed issue
  dedupe_loose_title_match: true                # also match open issues by `{slug} in:title` for back-compat with un-per-slug-labeled history
  dedupe_by_fingerprint: true                   # finding-level fingerprint dedup across the existing issue body + all comments
  on_duplicate: "comment"                       # "comment" | "skip" (legacy "create_anyway" → coerced to "comment")
  on_duplicate_all_covered: "skip_no_comment"   # if every finding fingerprint already exists, post nothing
  backfill_per_slug_label: true                 # `gh issue edit --add-label lab:<slug>` on comment so future strict dedup queries match
  labels_always: ["lab-audit"]
  labels_non_deterministic: ["non-deterministic-lab"]

  # --- Open-PR append carve-out (default ON, screenshots-only) ---
  # Default behavior: when an open fix-PR for a lab exists AND the run produced
  # refreshed screenshots, push them onto that branch. Suppress with the CLI
  # flag --no-update-screenshots (alias --no-append-to-pr) or by setting
  # `enabled_by_default: false` here. The guardrails (same-author, mergeable,
  # unprotected branch, no force-push, screenshots-only) still apply.
  # See skills/mcs-lab-pr-appender/SKILL.md and
  # skills/mcs-lab-auditor/references/pr-append-flow.md.
  pr_append:
    enabled_by_default: true                    # screenshot updates are part of every run by default
    pr_branch_pattern: "dewain/fix-{slug}-content-audit"   # used as a fallback match if the title query misses
    scope: "screenshots_only"                   # "screenshots_only" — no other value supported yet
    require_same_author: true                   # current `gh` user must match PR author
    require_mergeable: true                     # `mergeable: MERGEABLE` required
    allow_force_push: false                     # never enabled

# --- Existing-state probe (Phase 1.4) ---
existing_state:
  check_open_issues: true       # off → orchestrator falls back to inline filer queries (legacy behavior)
  check_open_prs: true          # required for pr_append to fire
  cache_file: "existing-state.yml"   # written under runs/<run-id>/

# --- Plugin version (written into manifest.yml and issue bodies) ---
plugin_version: "0.1.0"
