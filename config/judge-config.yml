# Judge and execution configuration for Agent Academy Lab Tester

# --- Confidence thresholds ---
confidence:
  min_to_log: 0.5
  low_confidence_marker_max: 0.7
  min_to_report: 0.6

# --- Step execution ---
execution:
  transient_retries: 1
  max_steps_per_lab: 150
  scene_boundary_probe: true
  skip_judge_on_pure_navigate: true

  # Network retry policy
  network_retry_count: 3
  network_retry_backoff_seconds: [5, 10, 20]

  # Model assignments for sub-agents
  model:
    judge: sonnet
    critique: sonnet
    lab_parser: sonnet
    step_executor: sonnet

# --- Critique pass ---
critique:
  enabled: true
  downgrade_on_failure: true

# --- Report output ---
report:
  # Where to write test results (relative to plugin runtime dir)
  output_dir: "runtime/test-results"
  format: "markdown"  # markdown | json
  include_screenshots: true

# --- GitHub issue filing ---
# When findings meet the confidence threshold, file one issue per lab on the
# agent-academy repo. Deduplicates against open issues so the same lab never
# gets a duplicate open issue.
issues:
  enabled: true
  repo: "microsoft/agent-academy"
  # Labels applied to every filed issue
  labels: ["lab-test", "automated"]
  # Title pattern — {course} and {slug} are replaced at runtime
  title_pattern: "[Lab Test] {course}/{slug}: {summary}"
  # Minimum confidence to include a finding in the issue body
  min_confidence_to_file: 0.7
  # Verdicts that trigger issue filing (at least one must be present in the lab)
  file_on_verdicts: ["broken", "unclear"]
  # Never file a duplicate open issue for the same lab
  dedupe_by_labels: true
  # When an open issue already exists for the lab, add a comment with new findings
  on_duplicate: "comment"

# Plugin version
plugin_version: "1.0.0"
