# ===========================================================================
# SAMPLE user lab-instances.yml — copy to:  %USERPROFILE%\.mcs-lab-auditor\lab-instances.yml
# ===========================================================================
#
# This file lets you point the plugin at your OWN fork of the lab repo and your
# OWN training portal, without editing any file inside the plugin (which would
# be overwritten on every plugin update).
#
# How it works
# ------------
# The plugin ships a registry (config/lab-instances.yml) that defines the
# built-in `mcs-labs` instance. THIS file is merged ON TOP of that registry:
#   - your values win per field,
#   - instances you add are appended,
#   - your `default_instance` overrides the shipped default.
# Resolve the active instance any time with:
#   pwsh -File <plugin>/scripts/Resolve-LabInstance.ps1 -Mode Status
#
# Active-instance resolution order (first match wins):
#   1. --instance <name>      (command flag, e.g. /audit-bootcamp --instance my-fork)
#   2. $env:LAB_INSTANCE
#   3. default_instance        (set below)
#   4. the shipped default     (mcs-labs)
#
# Prerequisite: this file is YAML and requires the `powershell-yaml` module:
#   Install-Module powershell-yaml -Scope CurrentUser -Force
# (The built-in mcs-labs instance still works without it.)
# ===========================================================================

# Which instance runs when no --instance flag and no $env:LAB_INSTANCE is given.
default_instance: my-fork

instances:

  # -------------------------------------------------------------------------
  # Example 1 — a fork whose training portal is a Copilot Studio chatbot
  # (the same shape as the bootcamp's "Lab Assistant" agent).
  # -------------------------------------------------------------------------
  my-fork:
    # REQUIRED — the GitHub repo where audit issues, fix-PRs, and new-lab PRs
    # are filed. Your `gh` login must have write/triage access to it.
    repo: "myorg/my-labs-fork"

    # REQUIRED — the git URL the lab content is cloned from when no local
    # working tree is found.
    clone_url: "https://github.com/myorg/my-labs-fork.git"

    # OPTIONAL — the PR/branch author prefix used for every branch the plugin
    # creates (e.g. <branch_prefix>/fix-<slug>-content-audit-<run-id>).
    # If omitted, it is derived from your `gh api user` login.
    branch_prefix: "myuser"

    # OPTIONAL — the relative file that marks a valid clone. Defaults to
    # _data/lab-config.yml (the mcs-labs layout). Only change this if your fork
    # restructured the repo.
    # marker: "_data/lab-config.yml"

    # OPTIONAL — local paths searched (in order) before cloning. Defaults to the
    # usual %USERPROFILE% locations under .mcs-lab-auditor\<instance-name>.
    # path_candidates:
    #   - "%USERPROFILE%\\Projects\\my-labs-fork"
    #   - "D:\\src\\my-labs-fork"

    # REQUIRED — your training portal. Either an inline `portal:` block (shown
    # here) or a `portal_file:` reference. These are the same fields as the
    # plugin's config/workshop.yml; override only what your portal needs.
    portal:
      portal_kind: "chatbot"                       # chatbot | skillable | email
      workshop_portal_url: "https://your.portal/redeem"
      sso_anchor_url: "https://login.microsoftonline.com/"
      auth_probe_url: "https://copilotstudio.microsoft.com/"
      tenant_hint: "my-fork-tenant"                # label only, never the tenant id

      # Does the chatbot require a workshop code before issuing the account?
      workshop_code_required: true

      # Deterministic pre-fills for the "Training user account request" form so
      # the plugin never has to prompt during redemption.
      chatbot_account_request_form:
        organization_type: "Microsoft"
        industry: "Technology (software & services)"
        company_size: "10,001+"
        country: "United States"
        job_title: "Software Engineer"

      # Pattern for the password set during the AAD first-login change.
      # {year} is replaced with the current calendar year.
      account_new_password_pattern: "MyFork-Audit-{year}!Q9"

  # -------------------------------------------------------------------------
  # Example 2 — a second fork whose portal is a Skillable-style code-entry
  # form (credentials shown on a confirmation page). Demonstrates that you can
  # define MORE THAN ONE instance and switch with --instance / $env:LAB_INSTANCE.
  # -------------------------------------------------------------------------
  contoso-internal:
    repo: "contoso/mcs-labs-internal"
    clone_url: "https://github.com/contoso/mcs-labs-internal.git"
    branch_prefix: "alice"
    portal:
      portal_kind: "skillable"
      workshop_portal_url: "https://labs.contoso.com/redeem"
      sso_anchor_url: "https://login.microsoftonline.com/"
      auth_probe_url: "https://copilotstudio.microsoft.com/"
      tenant_hint: "contoso-dev"
      # Skillable portals scrape credentials from the confirmation page; these
      # accessibility-label hints help locate the fields if a fresh snapshot ref
      # isn't found at runtime.
      redemption_selectors:
        code_input_label: "Workshop code"
        submit_button_text: "Redeem"
        credentials_panel_heading: "Your account"
        username_label: "Username"
        password_label: "Password"
        tenant_label: "Tenant"
        expiry_label: "Expires"
      account_new_password_pattern: "Contoso-Audit-{year}!Q9"

  # -------------------------------------------------------------------------
  # Example 3 — override ONLY one field of the SHIPPED mcs-labs instance.
  # Everything you DON'T list here is inherited from config/lab-instances.yml.
  # (Here: keep filing against microsoft/mcs-labs but use your own branch
  # prefix instead of the shipped `dewain`.)
  # -------------------------------------------------------------------------
  mcs-labs:
    branch_prefix: "myuser"
